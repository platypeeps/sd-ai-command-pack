[tool.ruff]
target-version = "py310"
line-length = 88
extend-exclude = [
    ".agents",
    ".build",
    ".claude",
    ".codex",
    ".gemini",
    ".github/skills",
    ".obsidian-kb",
    ".opencode",
    ".ruff_cache",
    ".sd-ai-command-pack",
    ".trellis",
    ".venv",
    "node_modules",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B"]

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
warn_unused_ignores = true
mypy_path = ".github/scripts"
