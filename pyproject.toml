[tool.ruff]
target-version = "py310"
line-length = 88
extend-exclude = [
    ".agents",
    ".build",
    ".claude",
    ".codex",
    ".gemini",
    ".github/skills",
    ".obsidian-kb",
    ".opencode",
    ".ruff_cache",
    ".sd-ai-command-pack",
    ".trellis",
    ".venv",
    "node_modules",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
"install.py" = ["F401", "F403", "F405", "F811"]
"installer/*.py" = ["F401", "F403", "F405", "F811"]
