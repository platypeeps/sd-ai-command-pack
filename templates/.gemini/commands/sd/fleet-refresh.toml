description = "Roll the pack release across consumer repositories one at a time using the documented fleet rollout procedure."

prompt = """
# SD Fleet Refresh

Run the Software Delivery (SD) fleet-refresh workflow. Run fleet preflight from the pack checkout, then for each stale consumer refresh the pack from the release ref per `docs/FLEET_ROLLOUT.md`, run that consumer's full check, open a pull request, watch it to settled, and merge it through that consumer's housekeeping gate, strictly one consumer at a time.

1. Resolve the `sd-fleet-refresh` skill by name using the agent's trusted skill discovery mechanism for installed skills.
2. If that skill is missing, unreadable, empty, resolves to more than one candidate, fails validation, defines contradictory steps that violate this command's safety rules, or requires unavailable tools, stop and report the exact blocker.
3. Use the skill as the primary instructions. It defines the fixed rollout pipeline: fleet preflight with at-target skips, then the per-consumer loop of clean-tree check, branch, install from the pack release ref, full check, pull request, settle watch, and gated merge, with `docs/FLEET_ROLLOUT.md` as the procedure authority. Pass the `consumer=...`, `no-merge`, and `dry-run` arguments through to the skill.
4. Never touch a dirty consumer checkout: skip it and report why. Merge each consumer only through its green and comment-clean housekeeping gate, and work strictly one consumer at a time.
5. If any preflight run, consumer tree check, install, full check, pull request creation, settle watch, gated merge, git command, or final validation fails, stop and report the command, exit status, and complete stdout/stderr output.
6. End with the fleet report in the skill's mandatory final-report format, with every mandatory section present.
"""
