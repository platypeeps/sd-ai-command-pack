name: Tests

on:
  pull_request:
    paths-ignore:
      - ".trellis/workspace/**"
  push:
    branches:
      - main
    paths-ignore:
      - ".trellis/workspace/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run tests
        run: COVERAGE_PROCESS_START=.coveragerc python3 -m coverage run --parallel-mode -m unittest discover -s tests

      - name: Combine coverage data
        run: python3 -m coverage combine

      - name: Report coverage
        run: python3 -m coverage report --fail-under=100

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install security scanners
        run: python3 -m pip install -r requirements-security.txt

      # Scans pack-owned shipped Python only. Trellis-vendored hook adapters
      # and the unshipped test suite are out of scope; the gate blocks on
      # medium+ severity so subprocess-to-git/gh Low findings stay advisory.
      - name: Bandit (shipped Python)
        run: bandit -q -r --severity-level medium install.py scripts templates/scripts

      - name: Zizmor (workflow security)
        run: zizmor --offline .github/workflows/

  # Single aggregate context for branch protection, matching the fleet
  # convention: protection requires only "CI Result" so matrix or lane
  # changes never strand a PR waiting on a renamed context.
  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [unittest, security]
    if: always()

    steps:
      - name: Evaluate required lanes
        env:
          UNITTEST_RESULT: ${{ needs.unittest.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          echo "unittest=$UNITTEST_RESULT security=$SECURITY_RESULT"
          if [ "$UNITTEST_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
            echo "A required lane did not succeed."
            exit 1
          fi
