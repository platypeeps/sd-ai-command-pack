name: Tests

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - ".trellis/workspace/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  unittest:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run tests
        # Shards the suite by module across workers (coverage --parallel-mode
        # writes one data file per shard for the combine step below). The
        # runner sets the absolute coverage env so installer subprocesses
        # launched from temp cwds still load the config and land their shards
        # where combine finds them.
        shell: bash
        run: bash .github/scripts/run-tests.sh

      - name: Fail on skipped tests
        shell: bash
        run: |
          if grep -Eq 'skipped=[1-9][0-9]*' unittest-output.log; then
            echo "Tests skipped under CI; install required tools or make the skip explicit."
            exit 1
          fi

      - name: Combine coverage data
        run: python3 -m coverage combine

      - name: Report installer coverage (gate 100%)
        run: python3 -m coverage report --include="install.py,installer/*" --fail-under=100

      - name: Report shipped-scripts coverage
        run: bash .github/scripts/check-shipped-script-coverage.sh

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install lint dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Ruff (pack Python)
        run: python3 -m ruff check install.py installer scripts templates/scripts tests

      # Mirrors the Makefile lint target's mypy scope: installer/, the
      # install.py facade, and shipped scripts/*.py. templates/scripts/
      # twins stay excluded (byte-identical mirrors; duplicate script
      # names would collide in one mypy run).
      - name: Mypy (pack Python)
        run: python3 -m mypy installer install.py scripts

      - name: Review preflight JavaScript syntax
        run: |
          node --check scripts/sd-ai-command-pack-review-preflight.mjs
          node --check templates/scripts/sd-ai-command-pack-review-preflight.mjs

      - name: OpenCode JavaScript syntax
        run: bash .github/scripts/check-opencode-js.sh

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-security.txt

      - name: Install security scanners
        run: python3 -m pip install -r requirements-security.txt

      # Scans pack-owned shipped Python only. Trellis-vendored hook adapters
      # and the unshipped test suite are out of scope; the gate blocks on
      # medium+ severity so subprocess-to-git/gh Low findings stay advisory.
      - name: Bandit (shipped Python)
        run: bandit -q -r --severity-level medium install.py installer scripts templates/scripts

      - name: Zizmor (workflow security)
        run: zizmor --offline .github/workflows/

      # Consumers vendor ~6k lines of pack shell and exempt it from line
      # review ("reviewed upstream"), so upstream lint rigor is the
      # compensating control. Warning severity is the achieved baseline;
      # keep it there.
      - name: Shellcheck (pack shell and hooks)
        run: git ls-files -z '*.sh' | xargs -0 shellcheck -S warning .githooks/pre-push

  release-payload-gate:
    name: Release payload gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out pull request
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run release payload gate
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git cat-file -e "${BASE_SHA}^{commit}"
          SD_AI_COMMAND_PACK_FULL_CHECK_TEST_SOURCE=1 \
          SD_AI_COMMAND_PACK_FULL_CHECK_RELEASE_BASE_REF="${BASE_SHA}" \
          bash -c 'source scripts/sd-ai-command-pack-full-check.sh; run_pack_source_drift_gates'

  main-push-scope:
    name: Main push scope
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out pushed history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject non-chore direct main pushes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          reviewed_pr_merge=0
          reviewed_pr_count="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" |
              jq --arg sha "$GITHUB_SHA" --arg base "$GITHUB_REF_NAME" \
                '[.[] | select(.merged_at != null and .merge_commit_sha == $sha and .base.ref == $base)] | length'
          )"
          if [ "$reviewed_pr_count" -gt 0 ]; then
            reviewed_pr_merge=1
          fi
          SD_AI_COMMAND_PACK_MAIN_PUSH_PR_MERGE="$reviewed_pr_merge" \
            bash .github/scripts/check-main-push-scope.sh \
              "${{ github.event.before }}" "${{ github.sha }}"

  # Single aggregate context for branch protection, matching the fleet
  # convention: protection requires only "CI Result" so matrix or lane
  # changes never strand a PR waiting on a renamed context.
  ci-result:
    name: CI Result
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [unittest, lint, security, release-payload-gate, main-push-scope]
    if: always()

    steps:
      - name: Evaluate required lanes
        env:
          UNITTEST_RESULT: ${{ needs.unittest.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          RELEASE_PAYLOAD_GATE_RESULT: ${{ needs.release-payload-gate.result }}
          MAIN_PUSH_SCOPE_RESULT: ${{ needs.main-push-scope.result }}
        run: |
          echo "unittest=$UNITTEST_RESULT lint=$LINT_RESULT security=$SECURITY_RESULT release_payload_gate=$RELEASE_PAYLOAD_GATE_RESULT main_push_scope=$MAIN_PUSH_SCOPE_RESULT"
          if [ "$UNITTEST_RESULT" != "success" ] || [ "$LINT_RESULT" != "success" ] || [ "$SECURITY_RESULT" != "success" ]; then
            echo "A required lane did not succeed."
            exit 1
          fi
          if [ "$RELEASE_PAYLOAD_GATE_RESULT" != "success" ] && [ "$RELEASE_PAYLOAD_GATE_RESULT" != "skipped" ]; then
            echo "The release payload gate failed."
            exit 1
          fi
          if [ "$MAIN_PUSH_SCOPE_RESULT" != "success" ] && [ "$MAIN_PUSH_SCOPE_RESULT" != "skipped" ]; then
            echo "The direct-main push scope backstop failed."
            exit 1
          fi

  auto-tag-release:
    name: Auto-tag release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: ci-result
    # !cancelled() suppresses the implicit success() status check, which
    # evaluates over the TRANSITIVE needs chain: release-payload-gate is
    # PR-only, so it is skipped on every main push, and implicit success()
    # then silently skips this job (v0.13.2-v0.14.0 shipped untagged before
    # this guard). ci-result (if: always()) already validates every lane.
    if: ${{ !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-result.result == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Check out release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create manifest version tag
        env:
          BASE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
        run: >-
          python3 .github/scripts/create-release-tag.py
          --base "$BASE_SHA"
          --head "$HEAD_SHA"
          --repository "$GITHUB_REPOSITORY"
